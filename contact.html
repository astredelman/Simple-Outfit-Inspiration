<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Simple Outfit Inspiration</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Simple Outfit Inspiration</h1>
        <p>We'd love to hear from you!</p>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Form -->
    <main>

        <section class="contact">

            <h2>Contact Us</h2>

            <p>
                Have a question or suggestion? Fill out the form below.
            </p>

            <form id="contactForm">

                <label for="name">Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your name"
                    required
                >

                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >

                <label for="message">Message</label>
                <textarea
                    id="message"
                    name="message"
                    rows="6"
                    placeholder="Write your message..."
                    required
                ></textarea>

                <button type="submit">Send Message</button>

            </form>

            <!-- JavaScript will display a message here -->
            <p id="confirmation"></p>

        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Simple Outfit Inspiration | Created by Alyssa</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
